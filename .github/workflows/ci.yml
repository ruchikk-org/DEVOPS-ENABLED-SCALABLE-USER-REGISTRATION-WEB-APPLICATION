name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ruchikk_org/user-registration-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t ruchikk_org/user-registration-frontend:latest ./frontend

      - name: Push Backend Image
        run: |
          docker push ruchikk/user-registration-backend:latest

      - name: Push Frontend Image
        run: |
          docker push ruchikk/user-registration-frontend:latest
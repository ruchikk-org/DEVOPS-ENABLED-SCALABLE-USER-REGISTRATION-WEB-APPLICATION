name: CI-CD Pipeline

on:
  push:
    branches:
      - main


jobs:

  build-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: |
        docker build \
        -t ruchikk/user-registration-backend:latest \
        ./backend

    - name: Build Frontend Image
      run: |
        docker build \
        -t ruchikk/user-registration-frontend:latest \
        ./frontend

    - name: Push Images
      run: |
        docker push ruchikk/user-registration-backend:latest
        docker push ruchikk/user-registration-frontend:latest

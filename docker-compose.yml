version: "3.8"

services:

  backend:
    build:
      context: ./backend
    container_name: fastapi-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:123456789@host.docker.internal:5432/userdb
      SECRET_KEY: collegeprojectsecretkey123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    restart: always


  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: always

    healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 30s
  timeout: 10s
  retries: 3